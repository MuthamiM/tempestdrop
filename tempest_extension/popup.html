<!DOCTYPE html>
<html>

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;500;700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff41;
            --neon-dim: #00cc33;
            --neon-glow: rgba(0, 255, 65, 0.15);
            --red: #ff003c;
            --red-glow: rgba(255, 0, 60, 0.15);
            --bg-deep: #050508;
            --bg-card: #0a0b0f;
            --bg-input: rgba(0, 255, 65, 0.03);
            --border: rgba(0, 255, 65, 0.12);
            --border-focus: rgba(0, 255, 65, 0.5);
            --text-dim: #4a4a5a;
            --text-mid: #7a7a8a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 340px;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-deep);
            color: #e0e0e0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Scanline overlay ── */
        .scanlines {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 100;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
        }

        /* ── Top accent bar ── */
        .accent-bar {
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--neon), transparent);
            opacity: 0.8;
        }

        .container {
            padding: 28px 24px 20px;
            position: relative;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 28px;
            position: relative;
        }

        .header::after {
            content: '';
            display: block;
            width: 40px;
            height: 1px;
            background: var(--border);
            margin: 16px auto 0;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            background: rgba(0, 255, 65, 0.03);
            position: relative;
        }

        .logo-icon::before {
            content: '⚡';
            font-size: 16px;
            filter: brightness(1.2);
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 13px;
            border: 1px solid rgba(0, 255, 65, 0.06);
        }

        .header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--neon);
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--neon-glow);
        }

        .header .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-top: 6px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ── Section label ── */
        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.58rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label::before {
            content: '›';
            color: var(--neon);
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* ── Input ── */
        .input-group {
            margin-bottom: 22px;
        }

        input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #fff;
            padding: 13px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            font-weight: 400;
            outline: none;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
        }

        input::placeholder {
            color: var(--text-dim);
            font-weight: 300;
        }

        input:focus {
            border-color: var(--border-focus);
            background: rgba(0, 255, 65, 0.04);
            box-shadow: 0 0 0 3px var(--neon-glow), 0 0 20px var(--neon-glow);
        }

        /* ── Byte counter ── */
        .byte-counter {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            color: var(--text-dim);
            text-align: right;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        .byte-counter span {
            color: var(--neon-dim);
        }

        /* ── Button ── */
        .btn-container {
            margin-bottom: 22px;
        }

        button {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, rgba(0, 255, 65, 0.08), rgba(0, 255, 65, 0.02));
            border: 1px solid rgba(0, 255, 65, 0.25);
            border-radius: 10px;
            color: var(--neon);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 65, 0.06), transparent);
            transition: left 0.5s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            border-color: rgba(0, 255, 65, 0.5);
            box-shadow: 0 0 25px var(--neon-glow), 0 4px 15px rgba(0, 0, 0, 0.3);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button.active {
            border-color: rgba(255, 0, 60, 0.4);
            color: var(--red);
            background: linear-gradient(135deg, rgba(255, 0, 60, 0.08), rgba(255, 0, 60, 0.02));
            box-shadow: 0 0 25px var(--red-glow);
        }

        button.active:hover {
            border-color: rgba(255, 0, 60, 0.6);
            box-shadow: 0 0 30px var(--red-glow), 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        button.active::before {
            background: linear-gradient(90deg, transparent, rgba(255, 0, 60, 0.06), transparent);
        }

        /* ── Status bar ── */
        .status-bar {
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: var(--neon);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--neon), 0 0 12px var(--neon-glow);
            flex-shrink: 0;
        }

        .status-dot.active {
            background: var(--red);
            box-shadow: 0 0 6px var(--red), 0 0 12px var(--red-glow);
            animation: pulse 1.2s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0%   { opacity: 0.5; transform: scale(0.85); }
            100% { opacity: 1;   transform: scale(1.15); }
        }

        #status-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .version-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.5rem;
            color: var(--text-dim);
            letter-spacing: 0.5px;
            padding: 3px 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.02);
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .footer span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.48rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── Transmission animation ── */
        .tx-indicator {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 14px;
        }

        .tx-indicator.active { display: flex; }

        .tx-bar {
            width: 3px;
            height: 12px;
            background: var(--red);
            border-radius: 2px;
            animation: txWave 0.6s ease-in-out infinite alternate;
            opacity: 0.6;
        }

        .tx-bar:nth-child(1) { animation-delay: 0s; height: 8px; }
        .tx-bar:nth-child(2) { animation-delay: 0.1s; height: 14px; }
        .tx-bar:nth-child(3) { animation-delay: 0.2s; height: 10px; }
        .tx-bar:nth-child(4) { animation-delay: 0.3s; height: 16px; }
        .tx-bar:nth-child(5) { animation-delay: 0.15s; height: 11px; }
        .tx-bar:nth-child(6) { animation-delay: 0.25s; height: 8px; }
        .tx-bar:nth-child(7) { animation-delay: 0.05s; height: 13px; }

        @keyframes txWave {
            0%   { transform: scaleY(0.4); opacity: 0.3; }
            100% { transform: scaleY(1);   opacity: 0.9; }
        }
    </style>
</head>

<body>
    <div class="scanlines"></div>
    <div class="accent-bar"></div>

    <div class="container">
        <div class="header">
            <div class="logo-icon"></div>
            <h2>TempestDrop</h2>
            <div class="subtitle">Optical Side-Channel TX Node</div>
        </div>

        <div class="input-group">
            <div class="section-label">Exfiltration Payload</div>
            <input type="text" id="payload" placeholder="Enter secret data..." value="PASS_HACK_2026" spellcheck="false">
            <div class="byte-counter"><span id="byteCount">14</span> chars &middot; <span id="bitCount">112</span> bits</div>
        </div>

        <div class="btn-container">
            <button id="toggleBtn">&#9656; Initiate Leak</button>
            <div class="tx-indicator" id="txIndicator">
                <div class="tx-bar"></div>
                <div class="tx-bar"></div>
                <div class="tx-bar"></div>
                <div class="tx-bar"></div>
                <div class="tx-bar"></div>
                <div class="tx-bar"></div>
                <div class="tx-bar"></div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-left">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text">System Standby</span>
            </div>
            <span class="version-tag">v1.0.4</span>
        </div>

        <div class="footer">
            <span>Manchester Encoded &middot; 10 Baud &middot; Photon Channel</span>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
